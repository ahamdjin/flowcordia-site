  <text x="670" y="311" fill="#18181b" font-family="Arial, sans-serif" font-size="20" text-anchor="middle">Task</text>
  <rect x="326" y="86" width="148" height="49" rx="24.5" fill="#fff" stroke="#d4d4d8" stroke-width="2"/>
  <text x="400" y="117" fill="#52525b" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">Git proposal</text>
  <rect x="326" y="425" width="148" height="49" rx="24.5" fill="#fff" stroke="#d4d4d8" stroke-width="2"/>
  <text x="400" y="456" fill="#52525b" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">Exact run</text>
